AWSTemplateFormatVersion: '2010-09-09'
Description: Despliegue de infraestructura STF

Resources:
  MiSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permitir SSH y Flask
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          CidrIp: 0.0.0.0/0

  InstanciaProyectoSTF:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0c101f26f147fa7fd
      KeyName: vockey
      SecurityGroups:
        - !Ref MiSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          dnf update -y
          dnf install docker git -y
          systemctl start docker
          systemctl enable docker
          cd /home/ec2-user
          git clone https://github.com/SalmuleFish/avanceDeProyectoTest-DevOps.git
          cd avanceDeProyectoTest-DevOps
          docker build -t mi-app .
          docker run -d -p 5000:5000 mi-app
          
# --- NUEVO RECURSO S3 ---
  BucketDeReportesSTF:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "reportes-stf-${AWS::AccountId}" # Nombre único usando tu ID de cuenta
      Tags:
        - Key: Proyecto
          Value: STF