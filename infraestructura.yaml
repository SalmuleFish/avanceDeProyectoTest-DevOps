AWSTemplateFormatVersion: '2010-09-09'
Description: Despliegue de infraestructura STF

Resources:
  MiSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permitir SSH y Flask
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          CidrIp: 0.0.0.0/0

  InstanciaProyectoSTF:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0c101f26f147fa7fd
      KeyName: vockey
      SecurityGroups:
        - !Ref MiSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          dnf update -y
          dnf install docker git -y
          systemctl start docker
          systemctl enable docker
          # Agregamos permisos al usuario para evitar líos de sudo luego
          usermod -aG docker ec2-user
          cd /home/ec2-user
          # Borramos si ya existe para evitar errores en el clone
          rm -rf avanceDeProyectoTest-DevOps
          git clone https://github.com/SalmuleFish/avanceDeProyectoTest-DevOps.git
          cd avanceDeProyectoTest-DevOps
          docker build -t mi-app .
          docker run -d -p 5000:5000 mi-app
          # --- CONFIGURACIÓN DE CRON JOB ---
          echo "0 0 * * * truncate -s 0 /var/lib/docker/containers/*/*-json.log" > /etc/cron.d/limpieza_logs
          chmod 644 /etc/cron.d/limpieza_logs

  # --- NUEVO RECURSO S3 ---
  BucketDeReportesSTF:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "reportes-stf-${AWS::AccountId}"
      Tags:
        - Key: Proyecto
          Value: STF