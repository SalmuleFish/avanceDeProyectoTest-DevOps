AWSTemplateFormatVersion: '2010-09-09'
Description: Despliegue de infraestructura STP

Resources:
  MiSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permitir SSH y Flask
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          CidrIp: 0.0.0.0/0

  InstanciaProyectoSTP:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0c101f26f147fa7fd
      KeyName: vockey
      SecurityGroups:
        - !Ref MiSecurityGroup
      Tags:
        - Key: Name
          Value: InstanciaProyectoSTP
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Instalacion y arranque de Docker
          dnf update -y
          dnf install docker git -y
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ec2-user

          # Clonar repositorio
          cd /home/ec2-user
          rm -rf avanceDeProyectoTest-DevOps
          git clone https://github.com/SalmuleFish/avanceDeProyectoTest-DevOps.git
          cd avanceDeProyectoTest-DevOps

          # Construir y ejecutar contenedor
          docker build -t mi-app .
          docker run -d -p 5000:5000 --restart always --name web-stp mi-app

          # Configuracion de mantenimiento
          mkdir -p /etc/cron.d
          echo "0 0 * * * truncate -s 0 /var/lib/docker/containers/*/*-json.log" > /etc/cron.d/limpieza_logs
          chmod 644 /etc/cron.d/limpieza_logs

  BucketDeReportesSTP:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "reportes-stp"
      Tags:
        - Key: Proyecto
          Value: STP